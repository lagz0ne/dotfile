"$schema" = 'https://starship.rs/config-schema.json'

# Gray palette:
#   bright:  #e0e0e0
#   light:   #b0b0b0
#   medium:  #808080
#   dim:     #606060

[character]
success_symbol = "[❯](bold #b0b0b0)"
error_symbol = "[❯](bold #e0e0e0)"

[directory]
style = "bold #b0b0b0"

[git_branch]
style = "bold #808080"

[git_status]
style = "#b0b0b0"

[git_metrics]
added_style = "#b0b0b0"
deleted_style = "#808080"

[cmd_duration]
style = "#808080"

[username]
style_user = "#b0b0b0"
style_root = "bold #e0e0e0"

[hostname]
style = "#808080"

[package]
style = "#808080"

[battery]
full_symbol = "• "
charging_symbol = "⇡ "
discharging_symbol = "⇣ "
unknown_symbol = "❓ "
empty_symbol = "❗ "

[nodejs]
style = "#b0b0b0"
symbol = "⬢ "

[python]
style = "#808080"

[rust]
style = "#b0b0b0"

[golang]
style = "#808080"

[java]
style = "#b0b0b0"

[docker_context]
style = "#808080"

[kubernetes]
style = "#b0b0b0"

[terraform]
style = "#808080"

[aws]
style = "#b0b0b0"

[gcloud]
style = "#808080"

[erlang]
symbol = "ⓔ "
style = "#808080"

[fortran]
symbol = "F "

[pulumi]
symbol = "🧊 "
style = "#808080"

[typst]
symbol = "t "
