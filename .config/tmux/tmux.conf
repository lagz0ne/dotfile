# True color and modern key handling.
set-option -sa terminal-overrides ",xterm*:Tc"
set -s extended-keys always
set -s terminal-features[100] 'xterm*:extkeys:clipboard'
set -s extended-keys-format csi-u
set -g allow-passthrough on

set -g mouse on
set -g history-limit 100000
set -s set-clipboard external
set -g copy-command 'tmux load-buffer -w -'

unbind r
bind r source-file ~/.config/tmux/tmux.conf

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind a copy-mode

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'Ataraxy-Labs/opensessions'

# tmux-resurrect / tmux-continuum.
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3 redis-cli npm node yarn pnpm bun cargo python python3 uv go docker lazygit btop htop vim nvim emacs less man tail watch claude codex'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# opensessions no-prefix shortcuts.
unbind-key -n C-M-s
set -g @opensessions-focus-global-key 'M-s'
set -g @opensessions-index-keys 'M-1 M-2 M-3 M-4 M-5 M-6 M-7 M-8 M-9'
bind-key -n C-S-e run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/focus.sh"

# tmux-fzf.
set-environment -g TMUX_FZF_LAUNCH_KEY F
set-environment -g TMUX_FZF_OPTIONS "-p -w 80% -h 70% -m"
set-environment -g TMUX_FZF_ORDER "session|window|pane|clipboard|keybinding|command|process"

# tmux-yank.
set -g @override_copy_command 'tmux load-buffer -w -'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# catppuccin.
set -g @catppuccin_status_background "#000000"
set-option -g status-position top
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right " #[fg=#89b4fa]GMT+7 #(TZ=Etc/GMT-7 date +%%H:%%M)"

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'tmux load-buffer -w -'

# Prefix-only pane navigation, safe for full-screen CLIs.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab last-pane
bind H display-popup -E -w 70% -h 75% 'bash ~/.config/tmux/help.sh | less -R'
bind s run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/focus.sh"

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

run '~/.config/tmux/plugins/tpm/tpm'

# Explicit direct opensessions jumps even if TPM/plugin option application gets stale.
bind-key -n M-1 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 1"
bind-key -n M-2 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 2"
bind-key -n M-3 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 3"
bind-key -n M-4 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 4"
bind-key -n M-5 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 5"
bind-key -n M-6 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 6"
bind-key -n M-7 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 7"
bind-key -n M-8 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 8"
bind-key -n M-9 run-shell "sh ~/.config/tmux/plugins/opensessions/integrations/tmux-plugin/scripts/switch-index.sh 9"

# Explicit resurrect bindings that do not conflict with opensessions prefix+C-s.
bind S run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh'
bind R run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh'
